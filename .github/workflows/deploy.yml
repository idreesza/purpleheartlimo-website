name: Deploy to Netlify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ── Lint & Validate ───────────────────────────────────────────────
  validate:
    name: Validate HTML & SEO Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          required=(index.html about.html services.html fleet.html contact.html sitemap.xml robots.txt netlify.toml)
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing required file: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Verify sitemap URLs
        run: |
          echo "Verifying sitemap.xml structure..."
          grep -c "<url>" sitemap.xml && echo "Sitemap contains URL entries."

      - name: Check robots.txt references sitemap
        run: |
          grep "Sitemap:" robots.txt || (echo "ERROR: robots.txt missing Sitemap directive" && exit 1)
          echo "OK: robots.txt has Sitemap directive"

      - name: Validate Netlify function exists
        run: |
          if [ ! -f "netlify/functions/contact.js" ]; then
            echo "ERROR: Contact function missing"
            exit 1
          fi
          echo "OK: Netlify function found"

  # ── Deploy to Netlify ─────────────────────────────────────────────
  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@latest

      - name: Deploy to Netlify (Production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy \
            --prod \
            --dir=. \
            --functions=netlify/functions \
            --message="Deploy from GitHub Actions — ${{ github.sha }}"

  # ── Deploy Preview (PRs) ──────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@latest

      - name: Deploy Preview to Netlify
        id: netlify-preview
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          DEPLOY_OUTPUT=$(netlify deploy \
            --dir=. \
            --functions=netlify/functions \
            --message="Preview PR #${{ github.event.pull_request.number }}" \
            --json 2>/dev/null || netlify deploy \
            --dir=. \
            --functions=netlify/functions \
            --message="Preview PR #${{ github.event.pull_request.number }}")
          echo "$DEPLOY_OUTPUT"

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **Netlify Preview deployed!** Check the Netlify dashboard for the preview URL.\n\n> Validate the site before merging to main.'
            })
