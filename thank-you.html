<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Purple Heart Limo Austin TX</title>
  <meta name="description" content="Thank you for contacting Purple Heart Limo. We'll be in touch within the hour. (512) 890-0900">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://purpleheartlimo.com/thank-you.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .thank-you-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a0533 60%, #0f0f0f 100%);
      position: relative;
      text-align: center;
      padding: 2rem;
    }
    .thank-you-page::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(124,58,237,0.15) 0%, transparent 70%);
    }
    .thank-you-card {
      position: relative;
      z-index: 2;
      max-width: 580px;
      width: 100%;
      background: rgba(26,26,26,0.9);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 20px;
      padding: 3.5rem 3rem;
      backdrop-filter: blur(10px);
    }
    .thank-you-icon {
      font-size: 4.5rem;
      margin-bottom: 1.5rem;
      display: block;
    }
    .countdown {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 2rem;
    }
    .countdown span {
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="thank-you-page">
    <div class="thank-you-card">
      <span class="thank-you-icon">&#9989;</span>
      <span class="section-label">Message Received</span>
      <h1 style="color:var(--text);font-size:2.2rem;margin:0.75rem 0 1rem;">Thank You!</h1>
      <p style="color:var(--text-muted);font-size:1.05rem;line-height:1.8;margin-bottom:1.5rem;">
        Your booking request has been received. Our team at <strong style="color:var(--accent);">Purple Heart Limo</strong> will review your details and respond within <strong style="color:var(--text);">1 hour</strong>.
      </p>
      <p style="color:var(--text-muted);font-size:0.95rem;margin-bottom:2rem;">
        Need an immediate response? Call or text us directly:
      </p>
      <a href="tel:+15128900900" class="btn btn-gold btn-lg" style="width:100%;justify-content:center;">
        &#128222; (512) 890-0900
      </a>
      <div style="margin-top:1.25rem;">
        <a href="index.html" class="btn btn-outline" style="width:100%;justify-content:center;">
          &#8592; Return to Homepage
        </a>
      </div>
      <div class="countdown" id="countdown">
        Redirecting to homepage in <span id="timer">10</span> seconds…
      </div>
    </div>
  </div>

  <script>
    let t = 10;
    const el = document.getElementById('timer');
    const iv = setInterval(() => {
      t--;
      if (el) el.textContent = t;
      if (t <= 0) { clearInterval(iv); window.location.href = 'index.html'; }
    }, 1000);
  </script>
</body>
</html>
