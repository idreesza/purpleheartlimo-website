# ─────────────────────────────────────────────────────────────
# 3b. Canonicalize blog URLs to a trailing slash.
# Directory posts (blog/<slug>/index.html) only serve at the
# trailing-slash URL; without this, /blog/<slug> falls through to
# the catch-all 404 below. This must stay AFTER the specific
# dead-post rules above (first match wins, so those still go to
# /blog/), and it collapses the no-slash duplicates GSC reports as
# "Alternate page with proper canonical tag". Legacy /blog/*.html
# files are unaffected — static files take precedence over
# non-forced redirects, so they keep serving directly.
# ─────────────────────────────────────────────────────────────
[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301
[[redirects]]
  from = "/blog/:slug"
  to = "/blog/:slug/"
  status = 301

# ─────────────────────────────────────────────────────────────
# 3c. API proxy → serverless functions (Google Routes drive-time
#     for the booking price estimate). Query string is preserved
#     automatically. Keeps the API key server-side.
# ─────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/api/distance"
  to     = "/.netlify/functions/distance"
  status = 200

# ─────────────────────────────────────────────────────────────
# 4. Custom 404 page — MUST stay last
# ─────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# Security & Performance Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security  = "max-age=63072000; includeSubDomains; preload"

# Cache static assets aggressively
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─────────────────────────────────────────────────────────────
# 5. AI-agent / markdown content-negotiation signals
#    (isitagentready.com readiness). Vary: Accept on the homepage
#    signals content-negotiation support; explicit content-type +
#    cache for the AI discovery files.
# ─────────────────────────────────────────────────────────────
[[headers]]
  for = "/"
  [headers.values]
    Vary = "Accept"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"
