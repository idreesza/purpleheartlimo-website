[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# ─────────────────────────────────────────────────────────────
# 1. Force HTTPS + non-www (canonical domain)
# Netlify handles HTTP→HTTPS automatically when "Force HTTPS" is ON
# in the dashboard. www→apex is handled by the "Primary domain"
# setting. These rules are belt-and-suspenders for crawlers.
# ─────────────────────────────────────────────────────────────
[[redirects]]
  from   = "https://www.purpleheartlimo.com/*"
  to     = "https://purpleheartlimo.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.purpleheartlimo.com/*"
  to     = "https://purpleheartlimo.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://purpleheartlimo.com/*"
  to     = "https://purpleheartlimo.com/:splat"
  status = 301
  force  = true

# ─────────────────────────────────────────────────────────────
# 2. Redirect /thank-you to the HTML file
# ─────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/thank-you"
  to     = "/thank-you.html"
  status = 200

# ─────────────────────────────────────────────────────────────
# 2b. Pretty-URL → real HTML files (GSC 404s)
# ─────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/about-us"
  to     = "/about.html"
  status = 301
[[redirects]]
  from   = "/about-us/"
  to     = "/about.html"
  status = 301
[[redirects]]
  from   = "/contact-us"
  to     = "/contact.html"
  status = 301
[[redirects]]
  from   = "/contact-us/"
  to     = "/contact.html"
  status = 301

[[redirects]]
  from   = "/html/head/title"
  to     = "/404.html"
  status = 410

# Google-parser artifact: it occasionally tries to crawl xpath
# fragments from speakable schema as URLs. Send to homepage.
[[redirects]]
  from   = "/html/*"
  to     = "/"
  status = 301

# ─────────────────────────────────────────────────────────────
# 3. 301 redirects for deleted legacy blog URLs (GSC 404s,
#    "crawled-not-indexed", and stale robots-blocked entries).
#    All point to /blog/ so we recover link equity instead of
#    serving 404s to Google.
